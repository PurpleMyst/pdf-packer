<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Packer</title>
    <style>
        body {
            font-family: system-ui, sans-serif;
            padding: 2rem;
            max-width: 600px;
            margin: 0 auto;
        }
        h1 { font-size: 1.5rem; }
        p { color: #666; }
        input[type="file"] {
            display: block;
            margin: 1rem 0;
        }
        #status { color: #666; margin: 1rem 0; }
        #download {
            display: none;
            color: #0066cc;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
</head>
<body>
    <h1>PDF Packer</h1>
    <p>Packs PDF pages onto A4, trimmed and labeled.</p>
    <input type="file" id="upload" accept="application/pdf" multiple>
    <div id="status"></div>
    <a id="download" href="#">Download PDF</a>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        const A4_WIDTH = 595.28, A4_HEIGHT = 841.89;
        const BLEED_PT = 8.5039, DPI = 300, SCALE = DPI / 72;
        const FONT_SIZE = 10, TEXT_GAP = 5;

        const upload = document.getElementById('upload');
        const status = document.getElementById('status');
        const downloadLink = document.getElementById('download');
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');

        upload.addEventListener('change', async (e) => {
            const files = Array.from(e.target.files);
            if (!files.length) return;

            status.textContent = `Processing ${files.length} file(s)...`;
            downloadLink.style.display = 'none';

            try {
                const outPdf = await PDFLib.PDFDocument.create();
                const font = await outPdf.embedFont(PDFLib.StandardFonts.Courier);
                let currentPage = outPdf.addPage([A4_WIDTH, A4_HEIGHT]);
                let currentY = A4_HEIGHT;

                for (const file of files) {
                    const arrayBuffer = await file.arrayBuffer();
                    const pdfJsDoc = await pdfjsLib.getDocument({ data: arrayBuffer.slice(0) }).promise;
                    const pdfLibDoc = await PDFLib.PDFDocument.load(arrayBuffer.slice(0));

                    for (let i = 1; i <= pdfJsDoc.numPages; i++) {
                        const page = await pdfJsDoc.getPage(i);
                        const viewport = page.getViewport({ scale: SCALE });

                        canvas.width = viewport.width;
                        canvas.height = viewport.height;
                        ctx.clearRect(0, 0, canvas.width, canvas.height);
                        await page.render({ canvasContext: ctx, viewport }).promise;

                        const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
                        let minX = canvas.width, minY = canvas.height, maxX = 0, maxY = 0, hasContent = false;

                        for (let y = 0; y < canvas.height; y++) {
                            for (let x = 0; x < canvas.width; x++) {
                                const idx = (y * canvas.width + x) * 4;
                                if (imgData[idx + 3] > 10 && (imgData[idx] < 250 || imgData[idx + 1] < 250 || imgData[idx + 2] < 250)) {
                                    hasContent = true;
                                    minX = Math.min(minX, x); maxX = Math.max(maxX, x);
                                    minY = Math.min(minY, y); maxY = Math.max(maxY, y);
                                }
                            }
                        }

                        if (!hasContent) { page.cleanup(); continue; }

                        const pageHeight = viewport.height / SCALE;
                        const left = minX / SCALE, right = maxX / SCALE;
                        const top = pageHeight - minY / SCALE, bottom = pageHeight - maxY / SCALE;
                        const width = right - left, height = top - bottom;
                        const totalH = height + TEXT_GAP + FONT_SIZE + BLEED_PT * 2;

                        if (totalH > currentY) {
                            currentPage = outPdf.addPage([A4_WIDTH, A4_HEIGHT]);
                            currentY = A4_HEIGHT;
                        }

                        const embeddedPage = await outPdf.embedPage(pdfLibDoc.getPages()[i - 1], { left, right, bottom, top });
                        const drawX = (A4_WIDTH - width) / 2;
                        const drawY = currentY - BLEED_PT - height;

                        currentPage.drawPage(embeddedPage, { x: drawX, y: drawY, width, height });

                        let label = file.name.replace(/[^\x20-\x7E]/g, '');
                        if (!label) label = 'unnamed';
                        if (label.length > 50) label = label.substring(0, 47) + '...';
                        if (pdfJsDoc.numPages > 1) label += ` (Pg ${i})`;

                        const textWidth = font.widthOfTextAtSize(label, FONT_SIZE);
                        currentPage.drawText(label, {
                            x: (A4_WIDTH - textWidth) / 2,
                            y: drawY - TEXT_GAP - FONT_SIZE + 2,
                            size: FONT_SIZE, font, color: PDFLib.rgb(0, 0, 0)
                        });

                        currentY -= totalH;
                        page.cleanup();
                    }
                    await pdfJsDoc.destroy();
                }

                const pdfBytes = await outPdf.save();
                const blob = new Blob([pdfBytes], { type: 'application/pdf' });
                downloadLink.href = URL.createObjectURL(blob);
                downloadLink.download = 'packed.pdf';
                downloadLink.style.display = 'inline';
                status.textContent = 'Done!';

            } catch (err) {
                console.error(err);
                status.textContent = `Error: ${err.message}`;
            }
        });
    </script>
</body>
</html>
