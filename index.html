<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Packer</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: system-ui, sans-serif;
            padding: 1.5rem;
            margin: 0 auto;
            min-height: 100vh;
        }
        h1 { font-size: 1.5rem; margin: 0 0 0.5rem; }
        p { color: #666; margin: 0 0 1rem; }
        input[type="file"] {
            display: block;
            width: 100%;
            padding: 1rem;
            font-size: 1rem;
            border: 2px dashed #ccc;
            border-radius: 8px;
            background: #fafafa;
            cursor: pointer;
        }
        input[type="file"]::file-selector-button {
            padding: 0.5rem 1rem;
            margin-right: 1rem;
            border: none;
            border-radius: 4px;
            background: #0066cc;
            color: #fff;
            cursor: pointer;
        }
        #status { 
            margin: 1.5rem 0; 
            font-weight: 500;
            min-height: 1.5rem;
        }
        #download {
            display: none;
            color: #0066cc;
            font-size: 1.1rem;
        }
        #preview {
            margin-top: 1.5rem;
            display: none;
        }
        #upload {
            display: block;
        }
        #upload.hidden {
            display: none;
        }
        #preview h2 {
            font-size: 1.1rem;
            margin: 0 0 1rem;
        }
        .file-card {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem;
            border: 1px solid #ddd;
            border-radius: 6px;
            margin-bottom: 0.5rem;
            background: #fafafa;
        }
        .file-card input[type="text"] {
            flex: 1;
            padding: 0.4rem 0.6rem;
            font-size: 0.9rem;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-family: inherit;
        }
        .file-card .page-count {
            color: #666;
            font-size: 0.85rem;
            white-space: nowrap;
        }
        .file-card .remove-btn {
            width: 28px;
            height: 28px;
            border: none;
            border-radius: 4px;
            background: #dc3545;
            color: #fff;
            cursor: pointer;
            font-size: 1rem;
            line-height: 1;
        }
        #addMore {
            display: block;
            width: 100%;
            padding: 0.75rem;
            border: 2px dashed #ccc;
            border-radius: 6px;
            background: none;
            color: #666;
            font-size: 0.9rem;
            cursor: pointer;
            margin-bottom: 1rem;
            transition: border-color 0.15s, background 0.15s, color 0.15s;
        }
        #addMore:hover, #addMore.drag-over {
            border-color: #0066cc;
            background: rgba(0, 102, 204, 0.05);
            color: #0066cc;
        }
        #actions {
            display: flex;
            gap: 0.75rem;
            justify-content: center;
            margin-top: 1rem;
        }
        #actions button {
            padding: 0.75rem 1.5rem;
            font-size: 1rem;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
        #packBtn {
            background: #0066cc;
            color: #fff;
        }
        #cancelBtn {
            background: #e0e0e0;
            color: #333;
        }
        @media (max-width: 640px) {
            body { padding: 1rem; }
            input[type="file"]::file-selector-button {
                padding: 0.75rem 1rem;
            }
            .file-card {
                flex-wrap: wrap;
            }
            .file-card .page-count {
                order: 3;
                width: 100%;
                margin-top: 0.25rem;
            }
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
</head>
<body>
    <h1>PDF Packer</h1>
    <p>Packs PDF pages onto A4, trimmed and labeled.</p>
    <input type="file" id="upload" accept="application/pdf" multiple>
    <div id="preview">
        <h2>Selected Files (<span id="fileCount">0</span>)</h2>
        <div id="fileList"></div>
        <button id="addMore">+ Add More Files</button>
        <div id="actions">
            <button id="packBtn">Pack PDFs</button>
            <button id="cancelBtn">Cancel</button>
        </div>
    </div>
    <div id="status"></div>
    <a id="download" href="#">Download PDF</a>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        const A4_WIDTH = 595.28, A4_HEIGHT = 841.89;
        const BLEED_PT = 8.5039, DPI = 300, SCALE = DPI / 72;
        const FONT_SIZE = 10, TEXT_GAP = 5;

        const upload = document.getElementById('upload');
        const status = document.getElementById('status');
        const downloadLink = document.getElementById('download');
        const preview = document.getElementById('preview');
        const fileList = document.getElementById('fileList');
        const fileCount = document.getElementById('fileCount');
        const addMoreBtn = document.getElementById('addMore');
        const packBtn = document.getElementById('packBtn');
        const cancelBtn = document.getElementById('cancelBtn');
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');

        const fileStates = [];

        function getPageCount(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = async (e) => {
                    try {
                        const pdf = await pdfjsLib.getDocument({ data: e.target.result }).promise;
                        resolve(pdf.numPages);
                    } catch {
                        resolve(0);
                    }
                };
                reader.onerror = () => resolve(0);
                reader.readAsArrayBuffer(file);
            });
        }

        function renderFileList() {
            fileList.innerHTML = '';
            fileStates.forEach((state, index) => {
                const card = document.createElement('div');
                card.className = 'file-card';
                card.innerHTML = `
                    <input type="text" value="${state.label}" data-index="${index}">
                    <span class="page-count">${state.pageCount} page${state.pageCount !== 1 ? 's' : ''}</span>
                    <button class="remove-btn" data-index="${index}">&times;</button>
                `;
                fileList.appendChild(card);
            });
            fileCount.textContent = fileStates.length;
        }

        async function handleFileSelection(e) {
            const files = Array.from(e.target.files);
            if (!files.length) return;

            status.textContent = `Scanning ${files.length} file(s)...`;

            for (const file of files) {
                const pageCount = await getPageCount(file);
                fileStates.push({
                    file,
                    label: file.name,
                    pageCount
                });
            }

            renderFileList();
            preview.style.display = 'block';
            upload.classList.add('hidden');
            status.textContent = '';
            upload.value = '';
        }

        fileList.addEventListener('input', (e) => {
            if (e.target.matches('input[type="text"]')) {
                const index = parseInt(e.target.dataset.index);
                fileStates[index].label = e.target.value;
            }
        });

        fileList.addEventListener('click', (e) => {
            if (e.target.matches('.remove-btn')) {
                const index = parseInt(e.target.dataset.index);
                fileStates.splice(index, 1);
                renderFileList();
                if (fileStates.length === 0) {
                    preview.style.display = 'none';
                }
            }
        });

        upload.addEventListener('change', handleFileSelection);

        addMoreBtn.addEventListener('click', () => {
            upload.click();
        });

        // Drag and drop on "Add More" button
        addMoreBtn.addEventListener('dragover', (e) => {
            e.preventDefault();
            addMoreBtn.classList.add('drag-over');
        });

        addMoreBtn.addEventListener('dragleave', () => {
            addMoreBtn.classList.remove('drag-over');
        });

        addMoreBtn.addEventListener('drop', (e) => {
            e.preventDefault();
            addMoreBtn.classList.remove('drag-over');
            const files = e.dataTransfer.files;
            if (files.length) {
                const dt = new DataTransfer();
                for (const f of files) dt.items.add(f);
                upload.files = dt.files;
                upload.dispatchEvent(new Event('change'));
            }
        });

        cancelBtn.addEventListener('click', () => {
            fileStates.length = 0;
            preview.style.display = 'none';
            upload.classList.remove('hidden');
            upload.value = '';
        });

        packBtn.addEventListener('click', async () => {
            if (!fileStates.length) return;

            preview.style.display = 'none';
            status.textContent = `Processing ${fileStates.length} file(s)...`;

            try {
                const outPdf = await PDFLib.PDFDocument.create();
                const font = await outPdf.embedFont(PDFLib.StandardFonts.Courier);
                let currentPage = outPdf.addPage([A4_WIDTH, A4_HEIGHT]);
                let currentY = A4_HEIGHT;
                let currentPageItems = [];

                const redistributeItems = (page, items) => {
                    if (items.length === 0) return;
                    const totalItemHeights = items.reduce((sum, item) => sum + item.height, 0);
                    const spacing = Math.max((A4_HEIGHT - totalItemHeights) / (items.length + 1), BLEED_PT);

                    let y = spacing;
                    for (const item of items) {
                        const drawX = (A4_WIDTH - item.width) / 2;
                        page.drawPage(item.embeddedPage, { x: drawX, y, width: item.width, height: item.height });

                        const textWidth = font.widthOfTextAtSize(item.label, FONT_SIZE);
                        page.drawText(item.label, {
                            x: (A4_WIDTH - textWidth) / 2,
                            y: y - TEXT_GAP - FONT_SIZE + 2,
                            size: FONT_SIZE, font, color: PDFLib.rgb(0, 0, 0)
                        });

                        y += item.height + spacing;
                    }
                };

                for (const state of fileStates) {
                    const arrayBuffer = await state.file.arrayBuffer();
                    const pdfJsDoc = await pdfjsLib.getDocument({ data: arrayBuffer.slice(0) }).promise;
                    const pdfLibDoc = await PDFLib.PDFDocument.load(arrayBuffer.slice(0));

                    for (let i = 1; i <= pdfJsDoc.numPages; i++) {
                        const page = await pdfJsDoc.getPage(i);
                        const viewport = page.getViewport({ scale: SCALE });

                        canvas.width = viewport.width;
                        canvas.height = viewport.height;
                        ctx.clearRect(0, 0, canvas.width, canvas.height);
                        await page.render({ canvasContext: ctx, viewport }).promise;

                        const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
                        let minX = canvas.width, minY = canvas.height, maxX = 0, maxY = 0, hasContent = false;

                        for (let y = 0; y < canvas.height; y++) {
                            for (let x = 0; x < canvas.width; x++) {
                                const idx = (y * canvas.width + x) * 4;
                                if (imgData[idx + 3] > 10 && (imgData[idx] < 250 || imgData[idx + 1] < 250 || imgData[idx + 2] < 250)) {
                                    hasContent = true;
                                    minX = Math.min(minX, x); maxX = Math.max(maxX, x);
                                    minY = Math.min(minY, y); maxY = Math.max(maxY, y);
                                }
                            }
                        }

                        if (!hasContent) { page.cleanup(); continue; }

                        const pageHeight = viewport.height / SCALE;
                        const left = minX / SCALE, right = maxX / SCALE;
                        const top = pageHeight - minY / SCALE, bottom = pageHeight - maxY / SCALE;
                        const width = right - left, height = top - bottom;
                        const totalH = height + TEXT_GAP + FONT_SIZE;

                        if (totalH > currentY) {
                            redistributeItems(currentPage, currentPageItems);
                            currentPage = outPdf.addPage([A4_WIDTH, A4_HEIGHT]);
                            currentY = A4_HEIGHT;
                            currentPageItems = [];
                        }

                        const copiedPage = pdfLibDoc.copyPages(pdfLibDoc.getPages(), [i - 1])[0];
                        const embeddedPage = await outPdf.embedPage(copiedPage, { left, right, bottom, top });

                        let label = state.label.replace(/[^\x20-\x7E]/g, '');
                        if (!label) label = 'unnamed';
                        if (label.length > 50) label = label.substring(0, 47) + '...';
                        if (pdfJsDoc.numPages > 1) label += ` (Pg ${i})`;

                        currentPageItems.push({ embeddedPage, width, height, label });
                        currentY -= totalH;
                        page.cleanup();
                    }
                    await pdfJsDoc.destroy();
                }

                if (currentPageItems.length > 0) {
                    redistributeItems(currentPage, currentPageItems);
                }

                const pdfBytes = await outPdf.save();
                const blob = new Blob([pdfBytes], { type: 'application/pdf' });
                const url = URL.createObjectURL(blob);

                downloadLink.href = url;
                downloadLink.download = 'packed.pdf';
                downloadLink.style.display = 'inline';
                status.textContent = 'Done!';

                window.open(url, '_blank');

            } catch (err) {
                console.error(err);
                status.textContent = `Error: ${err.message}`;
            }

            fileStates.length = 0;
        });
    </script>
</body>
</html>
